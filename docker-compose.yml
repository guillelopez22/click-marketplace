services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: click
      POSTGRES_PASSWORD: click
      POSTGRES_DB: click_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U click -d click_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
